[platformio]
src_dir = .

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = default.csv
upload_speed = 921600
monitor_speed = 115200
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    robtillaart/PCF8574@^0.4.5
    adafruit/Adafruit NeoPixel@^1.15.5
    pololu/VL53L0X@^1.3.1
	
# Include root .cpp/.h (AppRuntime, MotionController, etc.) so linker finds MainApp::* symbols.
build_src_filter = +<*> -<.git/> -<.vscode/> -<examples/> -<logs/> -<scripts/> -<.pio/> -<build_cache/>
